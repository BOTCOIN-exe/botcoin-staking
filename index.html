<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTCOIN Staking Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #f39c12; font-size: 24px; margin-bottom: 5px; }
        .status-box { background: #252525; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; border-left: 4px solid #f39c12; text-align: left; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #121212; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-connect { background: #f39c12; color: #000; }
        .btn-action { background: #34495e; color: white; }
        .btn-unstake { background: transparent; color: #e74c3c; border: 1px solid #e74c3c; }
        .btn-claim { background: #27ae60; color: white; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BOTCOIN STAKING</h1>
        <p style="color:#888; font-size:12px;">Network: TEMPO TESTNET (42431)</p>

        <div class="status-box">
            <div id="walletStatus">🔴 Not Connected</div>
            <div id="userAddress" style="font-family: monospace; font-size: 10px; color: #aaa;"></div>
        </div>

        <button id="btnConnect" class="btn-connect" onclick="connectWallet()">CONNECT WALLET</button>

        <hr>
        <input type="number" id="amountStake" placeholder="Jumlah koin TEMPO...">
        <button class="btn-action" onclick="approveTempo()">1. APPROVE</button>
        <button class="btn-action" onclick="stakeTempo()">2. STAKE</button>
        
        <hr>
        <input type="number" id="amountUnstake" placeholder="Jumlah tarik koin...">
        <button class="btn-unstake" onclick="unstakeTempo()">UNSTAKE</button>
        <button class="btn-claim" onclick="claimReward()">CLAIM BOTCOIN</button>
    </div>

    <script>
        const botcAddress = "0xbeB14bcd26F95e0E74c2c824f31977570769a4c1";
        const tempoAddress = "0x065c01edCF6b6032E70DF1517Fa34EC6504782a1";
        
        // KONFIGURASI FIX UNTUK TEMPO (42431)
        const TEMPO_CHAIN_ID_HEX = '0xa5bf'; 
        const TEMPO_RPC = 'https://rpc-testnet.temporelay.com'; 

        const abi = [
            "function approve(address spender, uint256 amount) returns (bool)",
            "function stakeTempo(uint256 amount)",
            "function unstake(uint256 amount)", 
            "function claimReward()"
        ];

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    // Paksa pindah ke ID 42431
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: TEMPO_CHAIN_ID_HEX }],
                    });
                } catch (err) {
                    if (err.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: TEMPO_CHAIN_ID_HEX,
                                chainName: 'Tempo Testnet',
                                rpcUrls: [TEMPO_RPC],
                                nativeCurrency: { name: 'TEMPO', symbol: 'TEMPO', decimals: 18 },
                                blockExplorerUrls: ['https://explorer.temporelay.com']
                            }],
                        });
                    }
                }
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletStatus').innerText = "🟢 Terhubung: Tempo Testnet";
                document.getElementById('userAddress').innerText = accounts[0];
            } else { alert("Pasang MetaMask!"); }
        }

        async function getSigner() {
            const provider = new ethers.providers.Web3Provider(window.ethereum, "any");
            const { chainId } = await provider.getNetwork();
            
            // Validasi keras: harus 42431
            if (chainId !== 42431) {
                alert("Salah Jaringan! Klik CONNECT WALLET untuk pindah ke Tempo.");
                throw new Error("Wrong Network");
            }
            return provider.getSigner();
        }

        async function approveTempo() {
            try {
                const signer = await getSigner();
                const tempoContract = new ethers.Contract(tempoAddress, abi, signer);
                const val = document.getElementById('amountStake').value;
                if(!val) return alert("Isi jumlah!");
                const amount = ethers.utils.parseUnits(val, 18);
                const tx = await tempoContract.approve(botcAddress, amount);
                await tx.wait(); alert("Approve Berhasil!");
            } catch (err) { alert("Error: " + err.message); }
        }

        async function stakeTempo() {
            try {
                const signer = await getSigner();
                const botcContract = new ethers.Contract(botcAddress, abi, signer);
                const val = document.getElementById('amountStake').value;
                const amount = ethers.utils.parseUnits(val, 18);
                const tx = await botcContract.stakeTempo(amount);
                await tx.wait(); alert("Staking Berhasil!");
            } catch (err) { alert("Error: " + err.message); }
        }

        async function unstakeTempo() {
            try {
                const signer = await getSigner();
                const botcContract = new ethers.Contract(botcAddress, abi, signer);
                const val = document.getElementById('amountUnstake').value;
                const amount = ethers.utils.parseUnits(val, 18);
                const tx = await botcContract.unstake(amount);
                await tx.wait(); alert("Unstake Berhasil!");
            } catch (err) { alert("Error: " + err.message); }
        }

        async function claimReward() {
            try {
                const signer = await getSigner();
                const botcContract = new ethers.Contract(botcAddress, abi, signer);
                const tx = await botcContract.claimReward();
                await tx.wait(); alert("Reward Diklaim!");
            } catch (err) { alert("Error: " + err.message); }
        }
    </script>
</body>
</html>
